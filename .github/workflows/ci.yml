name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências (sem GTK)
        run: |
          pip install ruff pytest pytest-cov
          pip install requests beautifulsoup4 lxml
          pip install opencv-python Pillow numpy scikit-learn httpx python-dotenv

      - name: "1/4 — Lint"
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: "2/4 — Smoke"
        run: pytest tests/smoke/ -v --timeout=10

      - name: "3/4 — Unit"
        run: pytest tests/unit/ -v

      - name: "4/4 — Verificação de anonimato"
        run: |
          if grep -r "Claude\|ChatGPT\|Gemini\|Copilot\|Anthropic\|OpenAI" src/ --include="*.py" 2>/dev/null; then
            echo "FALHA: Menção a IA detectada no código"
            exit 1
          fi
          echo "Anonimato OK"
